<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <title>Login - IT Equipment Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --dark: #34495e;
            --border: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: var(--primary);
            font-size: 22px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-radius: 5px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: #f8f9fa;
            color: var(--dark);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .auth-tab.active {
            background: var(--secondary);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            background: var(--secondary);
            color: white;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: #219a52;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.show { display: block; }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>IT Equipment Inventory</h1>
            <p id="authSubtitle">Sign in to manage inventory entries</p>
        </div>

        <div class="auth-tabs">
            <button type="button" class="auth-tab active" data-mode="login">Sign In</button>
            <button type="button" class="auth-tab" data-mode="signup">Sign Up</button>
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" required autocomplete="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>

        <form id="signupForm" class="auth-form">
            <div class="form-group">
                <label for="signupFullName">Full Name</label>
                <input type="text" id="signupFullName" required autocomplete="name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" required autocomplete="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label for="signupConfirmPassword">Confirm Password</label>
                <input type="password" id="signupConfirmPassword" required minlength="6" autocomplete="new-password" placeholder="Re-enter your password">
            </div>
            <button type="submit" class="btn btn-success" id="signupBtn">Create Account</button>
        </form>
    </div>

    <script>
        const alertEl = document.getElementById('alert');
        const authSubtitle = document.getElementById('authSubtitle');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const authTabs = document.querySelectorAll('.auth-tab');

        function showAlert(message, isError = true) {
            alertEl.textContent = message;
            alertEl.className = `alert ${isError ? 'alert-danger' : ''} show`;
        }

        function clearAlert() {
            alertEl.classList.remove('show');
        }

        function switchAuthMode(mode) {
            authTabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            loginForm.classList.toggle('active', mode === 'login');
            signupForm.classList.toggle('active', mode === 'signup');
            authSubtitle.textContent = mode === 'login'
                ? 'Sign in to manage inventory entries'
                : 'Create an admin account to get started';
            clearAlert();
        }

        authTabs.forEach(tab => {
            tab.addEventListener('click', () => switchAuthMode(tab.dataset.mode));
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            clearAlert();

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                window.location.href = '/';
            } catch (error) {
                showAlert(error.message);
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            clearAlert();

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        full_name: document.getElementById('signupFullName').value,
                        username: document.getElementById('signupUsername').value,
                        password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Sign up failed');
                }

                window.location.href = '/';
            } catch (error) {
                showAlert(error.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
